name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - run: npm run build

      - run: npm run lint

      - name: Check if version changed
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view n8n-nodes-spike version 2>/dev/null || echo "0.0.0")
          if [ "$PACKAGE_VERSION" != "$NPM_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Publishing v${PACKAGE_VERSION} (npm has v${NPM_VERSION})"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version v${PACKAGE_VERSION} already published, skipping"
          fi

      - name: Publish to npm with provenance
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Scan published package
        if: steps.version.outputs.changed == 'true'
        run: npx --yes @n8n/scan-community-package n8n-nodes-spike
